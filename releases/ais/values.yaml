# Default values for the AIS parent chart.
# Values here can override subchart defaults using the subchart name as a key.

# Global values shared across all subcharts
global: {}

# xnat subchart values (overrides xnat/values.yaml)
xnat:
  enabled: true
  # xnat overrides here

# ctp subchart values (overrides ctp/values.yaml)
ctp:
  enabled: false
  # ctp overrides here

# jupyterhub subchart values (overrides upstream values)
jupyterhub:
  enabled: true
  # jupyterhub overrides here

aisEdgeTool01:
  enabled: true
  # overrides here

aisEdgeTool02:
  enabled: false
  # overrides here