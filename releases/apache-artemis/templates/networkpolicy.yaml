{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "apache-artemis.fullname" . }}
  labels:
    {{- include "apache-artemis.labels" . | nindent 4 }}
spec:
  egress:
    {{- .Values.networkPolicy.egress | toYaml | nindent 4 }}
  ingress:
    {{- .Values.networkPolicy.ingress | toYaml | nindent 4 }}
  podSelector:
    matchLabels:
      {{- include "apache-artemis.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
    - Ingress
{{- end -}}
