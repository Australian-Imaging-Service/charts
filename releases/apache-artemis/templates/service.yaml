apiVersion: v1
kind: Service
metadata:
  name: {{ include "apache-artemis.fullname" . }}-web
  labels:
    {{- include "apache-artemis.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "apache-artemis.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "apache-artemis.fullname" . }}
  labels:
    {{- include "apache-artemis.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.artemis.type }}
  ports:
    - port: {{ .Values.service.artemis.port }}
      targetPort: artemis
      protocol: TCP
      name: artemis
  selector:
    {{- include "apache-artemis.selectorLabels" . | nindent 4 }}
