apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "apache-artemis.fullname" . }}-test-connection"
  labels:
    {{- include "apache-artemis.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: artemis-connect
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
      imagePullPolicy: {{ .Values.image.pullPolicy }}
      command: ['./bin/artemis']
      args:
        - connect
        - --url={{ include "apache-artemis.brokerUrl" . }}
  restartPolicy: Never
