{{- with (index .Values "xnat-web") -}}
{{- if .gateway.enabled -}}
{{- $svcPort := .service.port -}}
{{- $gatewayName := .gateway.gatewayName | default (include "xnat-web.fullname" $) -}}
{{- $gatewayNamespace := .gateway.gatewayNamespace | default $.Release.Namespace -}}
{{- $listenersAllowedRoutesFromNamespaces := .gateway.listenersAllowedRoutesFromNamespaces | default "Same" -}}
---
{{- if .gateway.createGateway -}}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $gatewayName }}
  namespace: {{ $gatewayNamespace }}
  labels:
    {{- include "xnat-web.labels" $ | nindent 4 }}
  {{- with .gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .gateway.gatewayClassName }}
  gatewayClassName: {{ .gateway.gatewayClassName }}
  {{- end }}
  {{- with .gateway.infrastructure }}
  infrastructure:
  {{- with .annotations }}
    annotations:
    {{- toYaml . | nindent 6 }}
  {{- end }}
  {{- with .labels }}
    labels:
    {{- toYaml . | nindent 6 }}
  {{- end }}    
  {{- end }}
  listeners:
  {{- if .gateway.http }}
  {{ range $index, $elem := .gateway.http.hosts }}
  - name: {{ $elem.listenerName | default (print "http-" $index) }}
    port: 80
    protocol: HTTP
    hostname: {{ $elem.host | quote }}
    allowedRoutes:
      namespaces:
        from: {{ $listenersAllowedRoutesFromNamespaces }}
  {{- end }}
  {{- end }}
  {{- if .gateway.https }}
  {{- range $index, $elem := .gateway.https.hosts }}
  - name: {{ $elem.listenerName | default (print "https-" $index) }}
    port: 443
    protocol: HTTPS
    hostname: {{ $elem.host | quote }}
    allowedRoutes:
      namespaces:
        from: {{ $listenersAllowedRoutesFromNamespaces }}
    tls:
      mode: Terminate
      certificateRefs:
      - kind: Secret
        name: {{ $elem.secretName }}
  {{- end }}
  {{- end }}
  {{- if .gateway.createNoHostnameListenerAndRoute }}
  - name: http-nohostname
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: {{ $listenersAllowedRoutesFromNamespaces }}
  {{- end }}
{{- end }}
---
{{- if .gateway.http }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  {{- if and (.gateway.https) (.gateway.redirectHttpToHttps) }}
  name: {{ include "xnat-web.fullname" $ }}-https-redirect
  {{- else }}
  name: {{ include "xnat-web.fullname" $ }}-http
  {{- end }}
  labels:
    {{- include "xnat-web.labels" $ | nindent 4 }}
spec:
  parentRefs:
  {{ range $index, $elem := .gateway.http.hosts }}
  - kind: Gateway
    name: {{ $gatewayName }}
    sectionName: {{ $elem.listenerName | default (print "http-" $index) }}
    namespace: {{ $gatewayNamespace }}
  {{- end }}
  hostnames:
  {{- range .gateway.http.hosts }}
  - {{ .host | quote }}
  {{- end }}
  rules:
  {{- if and (.gateway.https) (.gateway.redirectHttpToHttps) }}
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        port: 443
  {{- end }}
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ include "xnat-web.fullname" $ }}-headless
      port: {{ $svcPort }}
{{- end }}
---
{{- if .gateway.https }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "xnat-web.fullname" $ }}-https
  labels:
    {{- include "xnat-web.labels" $ | nindent 4 }}
spec:
  parentRefs:
  {{ range $index, $elem := .gateway.https.hosts }}
  - kind: Gateway
    name: {{ $gatewayName }}
    sectionName: {{ $elem.listenerName | default (print "https-" $index) }}
    namespace: {{ $gatewayNamespace }}
  {{- end }}
  hostnames:
  {{- range .gateway.https.hosts }}
  - {{ .host | quote }}
  {{- end }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ include "xnat-web.fullname" $ }}-headless
      port: {{ $svcPort }}
{{- end }}
---
{{- if .gateway.createNoHostnameListenerAndRoute }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "xnat-web.fullname" $ }}-http-nohostname
  labels:
    {{- include "xnat-web.labels" $ | nindent 4 }}
spec:
  parentRefs:
  - kind: Gateway
    name: {{ $gatewayName }}
    sectionName: http-nohostname
    namespace: {{ $gatewayNamespace }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ include "xnat-web.fullname" $ }}-headless
      port: {{ $svcPort }}
{{- end }}
{{- end }}
{{- end }}