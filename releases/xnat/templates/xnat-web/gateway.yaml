{{- with (index .Values "xnat-web") -}}
{{- if .gateway.enabled -}}
{{- $svcPort := .service.port -}}
{{- $gatewayName := .gateway.gatewayName | default (include "xnat-web.fullname" $) -}}
---
{{- if .gateway.createGateway -}}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $gatewayName }}
  labels:
    {{- include "xnat-web.labels" $ | nindent 4 }}
  {{- with .gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .gateway.gatewayClassName }}
  gatewayClassName: {{ .gateway.gatewayClassName }}
  {{- end }}
  {{- with .gateway.infrastructure }}
  infrastructure:
  {{- with .annotations }}
    annotations:
    {{- toYaml . | nindent 6 }}
  {{- end }}
  {{- with .labels }}
    labels:
    {{- toYaml . | nindent 6 }}
  {{- end }}    
  {{- end }}
  listeners:
  {{- if .gateway.hosts }}
  {{ range $index, $host := .gateway.hosts }}
  - name: http-{{ $index }}
    port: 80
    protocol: HTTP
    hostname: {{ $host | quote }}
  {{- end }}
  {{- else }}
  - name: http
    port: 80
    protocol: HTTP
  {{- end }}
  {{- if .gateway.tls }}
  {{- range $index, $elem := .gateway.tls.hosts }}
  - name: https-{{ $index }}
    port: 443
    protocol: HTTPS
    hostname: {{ $elem.host | quote }}
    tls:
      mode: Terminate
      certificateRefs:
      - kind: Secret
        name: {{ $elem.secretName }}
  {{- end }}
  {{- end }}
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  {{- if and (.gateway.tls) (.gateway.hosts) }}
  name: {{ include "xnat-web.fullname" $ }}-https-redirect
  {{- else }}
  name: {{ include "xnat-web.fullname" $ }}-http
  {{- end }}
  labels:
    {{- include "xnat-web.labels" $ | nindent 4 }}
spec:
  parentRefs:
  {{- if .gateway.hosts -}}
  {{ range $index, $host := .gateway.hosts }}
  - kind: Gateway
    name: {{ $gatewayName }}
    sectionName: http-{{ $index }}
  {{- end }}
  {{- else }}
  - kind: Gateway
    name: {{ $gatewayName }}
    sectionName: http
  {{- end }}
  {{- if .gateway.hosts -}}
  hostnames:
  {{- range .gateway.hosts }}
  - {{ . | quote }}
  {{- end }}
  {{- end }}
  rules:
  {{- if and (.gateway.tls) (.gateway.hosts) }}
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        port: 443
  {{- end }}
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ include "xnat-web.fullname" $ }}-headless
      port: {{ $svcPort }}
---
{{- if .gateway.tls }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "xnat-web.fullname" $ }}-https
  labels:
    {{- include "xnat-web.labels" $ | nindent 4 }}
spec:
  parentRefs:
  {{ range $index, $host := .gateway.tls.hosts }}
  - kind: Gateway
    name: {{ $gatewayName }}
    sectionName: https-{{ $index }}
  {{- end }}
  hostnames:
  {{- range .gateway.tls.hosts }}
  - {{ .host | quote }}
  {{- end }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ include "xnat-web.fullname" $ }}-headless
      port: {{ $svcPort }}
{{- end }}
{{- end }}
{{- end }}